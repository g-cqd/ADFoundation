name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    # Full-adopt of the reusable workflow for the COMMON legs: the gate (format/discipline +
    # SwiftLint metrics + config/manifest drift + internal-tag check), build/test on macOS + Linux
    # (debug + release, with coverage on the debug macOS leg), the macOS sanitizer matrix, and the
    # DocC build. ADFoundation is a LEAF for resolution purposes: its only non-dev dependency is
    # swift-syntax (a versioned package); the first-party AD-family deps (ADBuildTools, ADTestKit)
    # are gated behind `ADF_DEV` (Package.swift lines 53–79), so a clean CI checkout resolves with
    # NO unpublished siblings — hence `requires-published-siblings` is omitted (defaults false) and
    # build/test run on every push. Sanitizers mirror the previous bespoke macOS matrix
    # (address + thread). The package-UNIQUE invariants (tier isolation, warnings-as-errors over the
    # core tiers, the Linux sanitizer pass, and the dev-graph compile) stay as jobs below.
    uses: g-cqd/ADBuildTools/.github/workflows/swift-quality.yml@v1
    with:
      dev-env-var: ADF_DEV
      enable-sanitizers: true
      sanitizers: "address thread"
      enable-coverage: true
      enable-docs: true
      docs-target: ADFoundation

  strict-warnings:
    name: Warnings as errors (core tiers)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Treat warnings as errors for the zero-dependency tiers only. The `ADFoundation` umbrella pulls
      # ADFCore / ADFIO / ADFText / ADFUnicode / ADFAtomics but not swift-syntax, so `-Xswiftc` can't
      # fail the build on swift-syntax's own warnings (which we don't control). This stays a CI flag —
      # never a package setting — so consumers' builds are never gated on a future toolchain's warnings.
      - name: Build core tiers with -warnings-as-errors
        run: swift build --target ADFoundation -Xswiftc -warnings-as-errors

  strict-warnings-linux:
    name: Warnings as errors (core tiers, Linux)
    runs-on: ubuntu-latest
    # Dated nightly pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    steps:
      - uses: actions/checkout@v4
      # Same warnings-as-errors gate as macOS, but over the Glibc #else branches in ADFIO. Stays a CI
      # flag, never a package setting, for the same reason documented on the macOS job.
      - name: Build core tiers with -warnings-as-errors
        run: swift build --target ADFoundation -Xswiftc -warnings-as-errors

  tier-isolation:
    name: Tier isolation (core tiers stay swift-syntax-free)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # The package's defining invariant: the zero-dependency products (ADFCore / ADFUnicode /
      # ADFText / ADFIO and the ADFoundation umbrella) must never transitively link swift-syntax, so
      # the portable ADJSONCore and the apple-docs dylib keep clean resolution graphs. Build each in
      # isolation and fail if swift-syntax ever gets compiled as part of it. (Only ADFMacroSupport,
      # built separately, is allowed to.)
      - name: Build each core product and assert no swift-syntax compilation
        run: |
          rm -rf .build
          swift package resolve
          for product in ADFCore ADFUnicode ADFText ADFIO ADFoundation; do
            log=$(swift build --product "$product" 2>&1)
            echo "$log"
            if echo "$log" | grep -qiE 'Compiling (SwiftSyntax|SwiftParser|SwiftDiagnostics)'; then
              echo "::error::$product transitively compiled swift-syntax — core tiers must stay swift-syntax-free"
              exit 1
            fi
          done

  sanitizers-linux:
    name: Sanitizer Linux (${{ matrix.sanitize }})
    runs-on: ubuntu-latest
    # Dated nightly pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    strategy:
      fail-fast: false
      matrix:
        # Address catches the Glibc-path pointer/mmap code; undefined covers the C11 atomics shim
        # and pointer arithmetic. (Both pass locally on macOS; Linux exercises the #else branches.)
        # The macOS sanitizer matrix (address + thread) runs in the reusable `quality` job above; this
        # Linux pass is package-unique because the reusable's sanitizer leg is macOS-only.
        sanitize: [address, undefined]
    steps:
      - uses: actions/checkout@v4
      - name: Test under ${{ matrix.sanitize }}Sanitizer
        run: swift test --sanitize=${{ matrix.sanitize }}

  dev-build:
    name: Dev build (plugins, benchmarks, docs)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Compile the ADF_DEV-only graph (the LintBuild build-tool plugin and the ordo-one benchmark
      # target) so it can't bitrot, then build the DocC archives so doc links can't silently break.
      # The reusable `quality` job builds the canonical single-target (ADFoundation) DocC; this job
      # additionally compiles the full dev graph, which the reusable does not cover.
      - name: Build dev targets
        run: ADF_DEV=1 swift build
      - name: Build documentation
        run: ADF_DEV=1 swift package generate-documentation
